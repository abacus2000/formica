apiVersion: v1
kind: ServiceAccount
metadata:
  name: formica-controller
  namespace: {{ .Values.namespace }}
  labels: {{- include "formica.labels" . | nindent 4 }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: formica-agent
  namespace: {{ .Values.namespace }}
  labels: {{- include "formica.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: formica-controller-{{ .Values.env }}-{{ .Values.region }}
rules:
  - apiGroups: [""]
    resources: ["nodes", "pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["nodes", "pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: formica-controller-{{ .Values.env }}-{{ .Values.region }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: formica-controller-{{ .Values.env }}-{{ .Values.region }}
subjects:
  - kind: ServiceAccount
    name: formica-controller
    namespace: {{ .Values.namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: formica-controller-ns
  namespace: {{ .Values.namespace }}
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete", "patch"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: formica-controller-ns
  namespace: {{ .Values.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: formica-controller-ns
subjects:
  - kind: ServiceAccount
    name: formica-controller
    namespace: {{ .Values.namespace }}
