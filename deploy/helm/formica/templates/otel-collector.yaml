{{- /*
OpenTelemetry Collector: receives OTLP from agents + controller, batches,
exports to S3 as Parquet. Bucket name is derived from {env}/{region}
via the formica.s3bucket helper.
*/ -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: {{ .Values.namespace }}
  labels: {{- include "formica.labels" . | nindent 4 }}
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc: { endpoint: 0.0.0.0:4317 }
          http: { endpoint: 0.0.0.0:4318 }
    processors:
      batch:
        timeout: 10s
      resource:
        attributes:
          - { key: deployment.environment, from_attribute: formica.env,    action: upsert }
          - { key: cloud.region,           from_attribute: formica.region, action: upsert }
    exporters:
      awss3:
        s3uploader:
          region: {{ .Values.region | quote }}
          s3_bucket: {{ include "formica.s3bucket" . | quote }}
          s3_prefix: ""
          s3_partition: hour
          file_prefix: ""
        marshaler: otlp_parquet
    service:
      pipelines:
        traces:  { receivers: [otlp], processors: [resource, batch], exporters: [awss3] }
        metrics: { receivers: [otlp], processors: [resource, batch], exporters: [awss3] }
        logs:    { receivers: [otlp], processors: [resource, batch], exporters: [awss3] }
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: formica-otel-collector
  namespace: {{ .Values.namespace }}
  labels: {{- include "formica.labels" . | nindent 4 }}
  {{- with .Values.otel.serviceAccountAnnotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/component: otel-collector
    {{- include "formica.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/component: otel-collector }
  template:
    metadata:
      labels:
        app.kubernetes.io/component: otel-collector
        {{- include "formica.labels" . | nindent 8 }}
    spec:
      serviceAccountName: formica-otel-collector
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.104.0
          args: ["--config=/conf/config.yaml"]
          env:
            - { name: FORMICA_ENV,    value: {{ .Values.env    | quote }} }
            - { name: FORMICA_REGION, value: {{ .Values.region | quote }} }
          ports:
            - { containerPort: 4317, name: otlp-grpc }
            - { containerPort: 4318, name: otlp-http }
          volumeMounts:
            - { name: conf, mountPath: /conf }
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "500m", memory: "1Gi" }
      volumes:
        - name: conf
          configMap: { name: otel-collector-config }
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: {{ .Values.namespace }}
  labels: {{- include "formica.labels" . | nindent 4 }}
spec:
  selector: { app.kubernetes.io/component: otel-collector }
  ports:
    - { name: otlp-grpc, port: 4317, targetPort: 4317 }
    - { name: otlp-http, port: 4318, targetPort: 4318 }
