# Single-box Formica for GPU EC2 instances.
#
# Intended flow:
#   ssh ec2-user@<g4dn.xlarge launched from the prebaked Mistral-AWQ AMI>
#   git clone https://github.com/abacus2000/formica && cd formica
#   docker compose -f deploy/compose/docker-compose.yml up -d
#   formica solve "Prove sqrt(2) is irrational" --local --budget 1 --timeout 600
#
# The prebaked AMI (shared with abacus2000/rome) already ships:
#   - NVIDIA drivers + CUDA + Docker runtime
#   - /opt/models/mistral-awq   (Mistral-7B-Instruct-v0.2-AWQ weights)
#   - vllm/vllm-openai image pre-pulled into the local docker cache
#
# On any non-AMI host (e.g. stock DLAMI), set FORMICA_MODEL_SOURCE=hf and
# vLLM will download weights from HuggingFace on first boot (~8–15 min on T4).

services:
  neo4j:
    image: neo4j:5.26.24-community
    container_name: formica-neo4j
    environment:
      NEO4J_AUTH: "${FORMICA_NEO4J_USER:-neo4j}/${FORMICA_NEO4J_PASSWORD:-changeme}"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:7474 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  vllm:
    image: vllm/vllm-openai:latest
    container_name: formica-vllm
    # When FORMICA_MODEL_SOURCE=local (default, AMI path) vLLM reads weights
    # from the bind-mounted /opt/models/mistral-awq with zero network I/O.
    # When FORMICA_MODEL_SOURCE=hf, --model gets the HuggingFace repo id and
    # vLLM downloads at boot.
    command:
      - "--model=${FORMICA_MODEL_PATH:-/models/mistral-awq}"
      - "--served-model-name=${FORMICA_MODEL_ID:-TheBloke/Mistral-7B-Instruct-v0.2-AWQ}"
      - "--quantization=awq"
      - "--dtype=float16"
      - "--max-model-len=4096"
      - "--gpu-memory-utilization=0.85"
      - "--host=0.0.0.0"
      - "--port=8080"
    ports:
      - "8080:8080"
    volumes:
      - /opt/models:/models:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/v1/models || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 60        # vLLM cold-start on stock DLAMI can take 15 min.
      start_period: 60s

  # Optional: OTEL collector. Comment the whole service out if you don't want
  # telemetry flowing off-box during a local test.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    container_name: formica-otel
    command: ["--config=/conf/config.yaml"]
    volumes:
      - ../otel-collector/config.dev.yaml:/conf/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    profiles: ["telemetry"]

volumes:
  neo4j_data:
