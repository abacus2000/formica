apiVersion: apps/v1
kind: Deployment
metadata:
  name: formica-controller
  namespace: formica
  labels:
    app.kubernetes.io/component: controller
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels:
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        app.kubernetes.io/component: controller
    spec:
      serviceAccountName: formica-controller
      containers:
        - name: controller
          image: formica:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "formica.coordinator.main"]
          env:
            - { name: FORMICA_COMPONENT, value: "controller" }
            - { name: FORMICA_ENV, value: "dev" }
            - { name: FORMICA_REGION, value: "us-east-1" }
            - { name: FORMICA_NEO4J_URI, value: "bolt://neo4j.formica.svc.cluster.local:7687" }
            - name: FORMICA_NEO4J_PASSWORD
              valueFrom: { secretKeyRef: { name: neo4j-auth, key: NEO4J_PASSWORD } }
            - { name: FORMICA_OTLP_ENDPOINT, value: "http://otel-collector.formica.svc.cluster.local:4317" }
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
