---
# vLLM model server. OpenAI-compatible API on :8080.
#
# Single-box (k3d on the prebaked GPU AMI): weights are bind-mounted from the
# host at /opt/models/mistral-awq via a hostPath volume. The GPU is exposed to
# the pod via the nvidia device plugin (DaemonSet installed by k3d-gpu or the
# NVIDIA GPU Operator).
#
# Multi-node (EKS): replace the hostPath volume with a PVC backed by a model
# cache (e.g. EFS or an initContainer that rsyncs from S3). The Service name
# and port stay the same, so FormicaConfig.model_base_url does not change.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  namespace: formica
  labels:
    app.kubernetes.io/component: vllm
spec:
  replicas: 1
  strategy: { type: Recreate }   # only one GPU; no rolling update
  selector:
    matchLabels:
      app.kubernetes.io/component: vllm
  template:
    metadata:
      labels:
        app.kubernetes.io/component: vllm
    spec:
      containers:
        - name: vllm
          image: vllm/vllm-openai:latest
          imagePullPolicy: IfNotPresent
          args:
            - "--model=/models/mistral-awq"
            - "--served-model-name=TheBloke/Mistral-7B-Instruct-v0.2-AWQ"
            - "--quantization=awq"
            - "--dtype=float16"
            - "--max-model-len=4096"
            - "--gpu-memory-utilization=0.85"
            - "--host=0.0.0.0"
            - "--port=8080"
          ports:
            - containerPort: 8080
              name: http
          resources:
            limits:
              nvidia.com/gpu: 1
          volumeMounts:
            - name: models
              mountPath: /models
              readOnly: true
          readinessProbe:
            httpGet: { path: /v1/models, port: 8080 }
            # vLLM cold-start on a T4 with pre-baked weights is ~60–120s.
            # On a stock DLAMI (HF download) it can take 15 minutes.
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 60
            timeoutSeconds: 5
          livenessProbe:
            httpGet: { path: /v1/models, port: 8080 }
            initialDelaySeconds: 600
            periodSeconds: 30
            timeoutSeconds: 5
      volumes:
        - name: models
          hostPath:
            path: /opt/models
            type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: vllm
  namespace: formica
spec:
  selector:
    app.kubernetes.io/component: vllm
  ports:
    - name: http
      port: 8080
      targetPort: 8080
